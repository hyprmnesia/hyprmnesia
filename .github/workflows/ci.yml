name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changeset:
    name: Changeset
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require a changeset
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF:refs/remotes/origin/$BASE_REF"
          changed_files="$(git diff --name-only "origin/$BASE_REF"...HEAD)"
          echo "$changed_files"
          if ! grep -Eq '^\.changeset/[^/]+\.md$' <<< "$changed_files"; then
            echo "This PR must include at least one .changeset/*.md file." >&2
            echo "Run \`bun changeset\`, or add a small changeset manually." >&2
            exit 1
          fi

  checks:
    name: checks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            imagemagick \
            libayatana-appindicator3-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev \
            libxdo-dev \
            pkg-config

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify version sync
        run: bun run sync-version --check

      - name: Typecheck
        run: bun run typecheck

      - name: Biome check
        run: bun run check

      - name: Rust format check
        run: cargo fmt --all --check

      - name: Bun tests
        run: bun test

      - name: Rust tests
        run: cargo test --workspace

  validate:
    name: ${{ matrix.os }}
    needs: checks
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 (macOS SDK with MTLSamplerDescriptor.lodBias)
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            imagemagick \
            libayatana-appindicator3-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev \
            libxdo-dev \
            pkg-config

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release binary
        run: bun run build

      - name: Smoke built binary
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./dist/hpm.exe version
            ./dist/hpm.exe --help
          else
            ./dist/hpm version
            ./dist/hpm --help
          fi
