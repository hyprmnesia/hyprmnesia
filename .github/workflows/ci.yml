name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            imagemagick \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libxdo-dev \
            pkg-config

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify version sync
        run: bun run sync-version --check

      - name: Typecheck
        run: bun run typecheck

      - name: Biome check
        run: bun run check

      - name: Rust format check
        run: cargo fmt --all --check

      - name: Rust tests
        run: cargo test --workspace

      - name: Build release binary
        run: bun run build

      - name: Smoke built binary
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ./dist/hpm.exe version
            ./dist/hpm.exe --help
          else
            ./dist/hpm version
            ./dist/hpm --help
          fi
