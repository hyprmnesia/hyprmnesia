name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: >
      github.event_name != 'pull_request' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'changeset-release/main')
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.ref }}

      - name: Select Xcode 26 (macOS SDK with MTLSamplerDescriptor.lodBias)
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev \
            fakeroot \
            ffmpeg \
            imagemagick \
            libayatana-appindicator3-dev \
            libayatana-appindicator3-1 \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgtk-3-0 \
            libgtk-3-dev \
            libxdo-dev \
            libxdo3 \
            pkg-config

      - name: Install WiX
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package version
        id: version
        shell: bash
        run: |
          VERSION="$(bun -e "const pkg = await Bun.file('package.json').json(); console.log(pkg.version)")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}" >&2
            exit 1
          fi

      - name: Build release binary
        run: bun run build

      - name: Package installers
        run: bun run package

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}-${{ runner.arch }}
          path: artifacts/hyprmnesia-*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'changeset-release/main')
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p artifacts
          find release-artifacts -type f -name 'hyprmnesia-*' -exec cp '{}' artifacts/ \;
          VERSION="$(bun -e "const pkg = await Bun.file('package.json').json(); console.log(pkg.version)")"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          bun run release-notes -- "$VERSION"
          bun run checksums

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TARGET: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
        run: |
          TAG="v${RELEASE_VERSION}"
          mapfile -t ASSETS < <(find artifacts -type f ! -name 'RELEASE_NOTES.md' | sort)
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
            gh release edit "$TAG" --title "Hyprmnesia $TAG" --notes-file artifacts/RELEASE_NOTES.md --latest
          else
            gh release create "$TAG" "${ASSETS[@]}" --target "$RELEASE_TARGET" --title "Hyprmnesia $TAG" --notes-file artifacts/RELEASE_NOTES.md --latest
          fi
